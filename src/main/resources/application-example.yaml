server:
  port: 8583
  address: 0.0.0.0

spring:
  application:
    name: wigell-cinema
  datasource:
    url: jdbc:mysql://YOUR_MYSQL_HOST:YOUR_MYSQL_PORT/wigell_cinema_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://YOUR_KEYCLOAK_HOST:YOUR_KEYCLOAK_PORT/realms/YOUR_REALM
          jwk-set-uri: http://YOUR_KEYCLOAK_HOST:YOUR_KEYCLOAK_PORT/realms/YOUR_REALM/protocol/openid-connect/certs
  boot:
    admin:
      client:
        url: http://YOUR_DASHBOARD_HOST:YOUR_DASHBOARD_PORT
        instance:
          service-base-url: http://YOUR_TAILSCALE_IP:8583

keycloak:
  base-url: http://YOUR_KEYCLOAK_HOST:YOUR_KEYCLOAK_PORT
  realm: YOUR_REALM
  admin-username: YOUR_KEYCLOAK_ADMIN_USERNAME
  admin-password: YOUR_KEYCLOAK_ADMIN_PASSWORD

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

info:
  app:
    name: Wigell Cinema
    description: Cinema microservice for the Wigell Portal
    version: 1.0.0

logging:
  level:
    com.danielerikssoncoder.cinema_project: INFO
  file:
    name: logs/wigell-cinema.log